name: CI

# Phase 13.E (SYSTEM_REVIEW.md v2 / PLAN.md): every guarantee this refactor
# has built — the platform-seam boundary rule, the domain-layer unit tests,
# the Firestore security-rule fixes, the E2E characterization suite — only
# holds if something runs it on every push. This is that something.

on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint, unit tests, build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4

      # Model B hard line: the shared database schema is Bernard-only. Because the
      # team self-merges when CI is green, a failing check here *is* the block — no
      # human review gate needed. Bernard's own migration PRs pass; anyone else's fail.
      # See ONBOARDING.md §6/§7.
      - name: Guard — database schema is Bernard-only (Model B)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          DB_OWNERS="WhitewaterBernz"   # GitHub logins allowed to change migrations
          files=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
                    --paginate --jq '.[].filename')
          migr=$(printf '%s\n' "$files" | grep -E '^supabase/migrations/' || true)
          if [ -z "$migr" ]; then
            echo "No migration changes — nothing to guard."
            exit 0
          fi
          if printf '%s ' $DB_OWNERS | grep -qw -- "$PR_AUTHOR"; then
            echo "✓ $PR_AUTHOR is allowed to change database migrations."
            exit 0
          fi
          echo "::error title=Database schema is Bernard-only::PR by '$PR_AUTHOR' changes supabase/migrations/ — under Model B only [$DB_OWNERS] may. Ask Bernard to make the schema change (see ONBOARDING §7)."
          printf 'Blocked migration file(s):\n%s\n' "$migr"
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  rules:
    name: firestore rules (emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - run: npm ci
      - run: npm run test:rules

  e2e:
    name: e2e (memory adapter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
