name: DB change notify

# Automatically flags any PR that changes the database schema (touches
# supabase/migrations/) by adding a `db-change` label and @-mentioning the OTHER
# developer, so schema changes are never a surprise. Codifies the team agreement:
# "if we change the DB, tell the other party."

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Detect schema changes
        id: changed
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const touched = files.some(f => f.filename.startsWith('supabase/migrations/'));
            core.setOutput('touched', touched ? 'yes' : 'no');

      - name: Label + notify
        if: steps.changed.outputs.touched == 'yes'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            // ---------------------------------------------------------------
            // The two developers' GitHub usernames.
            // The PR author is filtered out automatically; the other is @-mentioned.
            const DEVS = ['WhitewaterBernz', 'tag0388'];
            // ---------------------------------------------------------------

            const author = context.payload.pull_request.user.login.toLowerCase();
            const toNotify = DEVS.filter(u => u.toLowerCase() !== author);

            // Ensure the label exists, then apply it.
            try {
              await github.rest.issues.getLabel({ owner, repo, name: 'db-change' });
            } catch {
              await github.rest.issues.createLabel({
                owner, repo, name: 'db-change', color: 'B60205',
                description: 'Changes the database schema (supabase/migrations/)',
              });
            }
            await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ['db-change'] });

            // Comment once (idempotent across re-runs via a hidden marker).
            const marker = '<!-- db-change-notify -->';
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            if (comments.some(c => c.body && c.body.includes(marker))) return;

            const mentions = toNotify.length
              ? toNotify.map(u => '@' + u).join(' ')
              : '_(configure reviewer handles in `.github/workflows/db-change-notify.yml`)_';

            await github.rest.issues.createComment({
              owner, repo, issue_number,
              body: [
                marker,
                `🗄️ **Heads-up ${mentions} — this PR changes the database schema** (\`supabase/migrations/\`).`,
                '',
                'Please review the migration before merge. After it lands on `main`, apply it with',
                '`npx supabase db push` — never via the Supabase Studio SQL editor.',
              ].join('\n'),
            });
